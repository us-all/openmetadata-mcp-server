<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lineage Impact</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fff; --fg: #1f2328; --muted: #57606a; --border: #d0d7de;
    --ok: #1a7f37; --warn: #bf8700; --err: #cf222e; --hl: #ddf4ff;
    --pill-warn: #fff8c5; --pill-err: #ffebe9; --pill-ok: #dafbe1;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0d1117; --fg: #c9d1d9; --muted: #8b949e; --border: #30363d;
      --ok: #3fb950; --warn: #d29922; --err: #f85149; --hl: #051a37;
      --pill-warn: #3a2700; --pill-err: #3a0d12; --pill-ok: #033a16; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg); background: var(--bg); padding: 16px; }
  h1 { font-size: 15px; margin: 0 0 4px; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 12px; word-break: break-all; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { display: flex; flex-direction: column; min-width: 120px; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat.warn .value { color: var(--warn); }
  .stat.err .value { color: var(--err); }
  section { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-top: 10px; }
  section h2 { font-size: 12px; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  ul { padding: 0; margin: 0; }
  li { list-style: none; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: baseline; font-size: 12px; }
  li:last-child { border-bottom: none; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; text-transform: uppercase; background: var(--hl); }
  .types { display: flex; gap: 6px; flex-wrap: wrap; }
  .types > span { background: var(--hl); border-radius: 8px; padding: 2px 8px; font-size: 11px; }
  .fanout { font-variant-numeric: tabular-nums; color: var(--muted); }
</style>
</head>
<body>
<div id="app">Loading…</div>
<script>
(function(){
  function escape(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

  function render(d) {
    if (!d) return '<p class="empty">No data.</p>';
    const e = d.entity || {};
    const im = d.impact || {};
    const types = im.downstreamByType || {};
    const top = Array.isArray(d.topConsumers) ? d.topConsumers : [];
    const owners = Array.isArray(d.owners) ? d.owners : [];
    const caveats = Array.isArray(d.caveats) ? d.caveats : [];

    const downCount = im.downstreamCount || 0;
    const downClass = downCount === 0 ? '' : downCount < 5 ? '' : downCount < 20 ? 'warn' : 'err';

    const typesBlock = Object.keys(types).length === 0 ? '<span class="empty">None.</span>' :
      `<div class="types">${Object.entries(types).map(([t, n]) => `<span>${escape(t)} · ${n}</span>`).join('')}</div>`;

    const topBlock = top.length === 0 ? '<li class="empty">No downstream consumers.</li>' :
      top.map(c => `<li>
        <span style="flex:1">
          <strong>${escape(c.name || c.fqn?.split('.').pop() || '')}</strong>
          <span class="mono"> — ${escape(c.fqn || '')}</span>
        </span>
        <span class="pill">${escape(c.type || '')}</span>
        <span class="fanout">→ ${escape(c.downstreamFanOut)}</span>
      </li>`).join('');

    const ownerBlock = owners.length === 0 ? '<li class="empty">No owner data.</li>' :
      owners.slice(0, 12).map(o => `<li>
        <span style="flex:1">${escape(o.displayName || o.name)}</span>
        <span class="pill">${escape(o.type || 'user')}</span>
      </li>`).join('') + (owners.length > 12 ? `<li class="empty">… and ${owners.length - 12} more</li>` : '');

    const cavBlock = caveats.length === 0 ? '' :
      `<section><h2>Caveats</h2><ul>${caveats.map(c => `<li>${escape(c)}</li>`).join('')}</ul></section>`;

    return `
      <h1>${escape(e.name || e.fqn?.split('.').pop() || 'Entity')}</h1>
      <div class="meta mono">${escape(e.type || '')} · ${escape(e.fqn || '')}</div>
      <div class="row">
        <div class="stat ${downClass}">
          <span class="label">Downstream</span>
          <span class="value">${downCount}</span>
        </div>
        <div class="stat">
          <span class="label">Upstream</span>
          <span class="value">${im.upstreamCount || 0}</span>
        </div>
        <div class="stat">
          <span class="label">Owners affected</span>
          <span class="value">${im.ownersAffected || 0}</span>
        </div>
      </div>
      <section>
        <h2>Downstream by type</h2>
        ${typesBlock}
      </section>
      <section>
        <h2>Top consumers (by fan-out)</h2>
        <ul>${topBlock}</ul>
      </section>
      <section>
        <h2>Owners to notify (${owners.length})</h2>
        <ul>${ownerBlock}</ul>
      </section>
      ${cavBlock}
    `;
  }
  function update(){ document.getElementById('app').innerHTML = render(window.openai && window.openai.toolOutput); }
  update();
  window.addEventListener('openai:set_globals', update);
})();
</script>
</body>
</html>
